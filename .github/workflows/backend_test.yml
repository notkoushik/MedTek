name: Backend CI

on:
  push:
    branches: [ "main", "koushik" ]
    paths:
      - 'medtek/backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'medtek/backend/**'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./medtek/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: medtek/backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      # - name: Run Tests
      #   run: npm test  # Uncomment when tests are added
